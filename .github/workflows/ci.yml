name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─── Frontend ─────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Run tests
        run: npm run test
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_MOCK_AUTH: 'true'
          VITE_API_URL: 'http://localhost:8000'

      - name: Build
        run: npm run build
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_MOCK_AUTH: 'true'
          VITE_API_URL: 'http://localhost:8000'

  # ─── Backend ──────────────────────────────────────────────────────
  backend:
    name: Backend — Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest --tb=short || echo "No tests found yet"
